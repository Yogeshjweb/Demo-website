<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOL-Stream | Daily Laughs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="p-4 border-b border-gray-800 flex justify-between items-center sticky top-0 bg-gray-900 z-50">
        <h1 class="text-2xl font-bold text-yellow-500">LOL-Stream</h1>
        <div class="space-x-4">
            <button class="bg-yellow-500 text-black px-4 py-2 rounded-lg font-bold hover:bg-yellow-400">Upload</button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            
            <div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg transition-transform hover:scale-105">
                <div class="aspect-video bg-black flex items-center justify-center">
                    <span class="text-gray-500 text-sm">[ Video Embed Goes Here ]</span>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-1">Cat fails at jumping </h3>
                    <p class="text-gray-400 text-sm">Uploaded by User123</p>
                    <div class="mt-3 flex justify-between items-center">
                        <span class="text-yellow-500 text-sm">😂 1.2k Likes</span>
                        <button class="text-gray-400 hover:text-white">Share</button>
                    </div>
                </div>
            </div>

            <div class="bg-gray-800 rounded-xl overflow-hidden shadow-lg transition-transform hover:scale-105">
                <div class="aspect-video bg-black flex items-center justify-center">
                    <span class="text-gray-500 text-sm">[ Video Embed Goes Here ]</span>
                </div>
                <div class="p-4">
                    <h3 class="font-bold text-lg mb-1">Dad Jokes: Extreme Edition</h3>
                    <p class="text-gray-400 text-sm">Uploaded by ComedyKing</p>
                    <div class="mt-3 flex justify-between items-center">
                        <span class="text-yellow-500 text-sm">😂 850 Likes</span>
                        <button class="text-gray-400 hover:text-white">Share</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

</body>
</html>
